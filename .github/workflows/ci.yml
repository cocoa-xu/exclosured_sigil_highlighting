name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Install dependencies
        working-directory: vscode
        run: npm ci

      - name: Compile
        working-directory: vscode
        run: npm run compile

      - name: Run tests
        working-directory: vscode
        run: npm test
